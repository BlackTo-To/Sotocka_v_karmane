<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Соточка в кармане: ЕГЭ математика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #f2f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .card {
            max-width: 420px;
            width: 100%;
            background-color: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(0, 20, 45, 0.15);
            padding: 24px 20px 28px;
            transition: all 0.2s;
        }

        /* status bar 21:14 (как на втором скрине) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 500;
            color: #1c2e45;
            margin-bottom: 20px;
            letter-spacing: 0.2px;
        }

        .status-left {
            display: flex;
            gap: 4px;
        }

        .signal-icons {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .signal-icons span {
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #1c2e45;
            border-radius: 10px;
        }

        .battery-symbol {
            display: inline-block;
            width: 22px;
            height: 10px;
            background: #1c2e45;
            border-radius: 3px;
            position: relative;
            margin-left: 5px;
        }
        .battery-symbol::after {
            content: "";
            position: absolute;
            right: -3px;
            top: 2px;
            width: 3px;
            height: 4px;
            background: #1c2e45;
            border-radius: 1px;
        }

        /* главный заголовок Ачивки */
        .achievements-title {
            font-size: 44px;
            font-weight: 750;
            color: #0b1b2f;
            line-height: 1;
            letter-spacing: -0.5px;
            margin-bottom: 18px;
        }

        /* премиум-баннер (пицца/990р) */
        .premium-banner {
            background: linear-gradient(145deg, #f9f2e7, #faead7);
            border-radius: 28px;
            padding: 20px 20px;
            margin-bottom: 24px;
            border: 1px solid #fbdead;
            box-shadow: 0 8px 18px -8px rgba(255,180,60,0.25);
        }

        .premium-emoji {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .premium-banner p {
            font-size: 18px;
            font-weight: 580;
            color: #3b2d17;
        }

        .premium-banner .price {
            font-size: 26px;
            font-weight: 750;
            color: #a3450b;
            margin-top: 6px;
            letter-spacing: -0.3px;
        }
        .price small {
            font-size: 16px;
            font-weight: 400;
            color: #785523;
        }

        /* статистика: 02 дня без пропуска */
        .stats-block {
            background: #f0f5fd;
            border-radius: 26px;
            padding: 18px 22px;
            margin-bottom: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #d9e2f0;
        }

        .stats-number {
            font-size: 46px;
            font-weight: 800;
            color: #163458;
            line-height: 1;
        }

        .stats-label {
            font-size: 18px;
            font-weight: 500;
            color: #2d4a77;
            text-align: right;
        }

        /* сетка 2x2 для теория/практика/тест/материалы (первый скрин) + дополнительные блоки со второго */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .feature-card {
            background: white;
            border-radius: 24px;
            padding: 18px 16px;
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.02), 0 0 0 1px #eef2f7 inset;
            border: 1px solid #e9edf4;
        }

        .feature-card h3 {
            font-size: 22px;
            font-weight: 680;
            color: #0b1f36;
            margin-bottom: 6px;
        }

        .feature-card p {
            font-size: 14px;
            color: #62748c;
            line-height: 1.4;
        }

        /* материалы для печати (может дублироваться, но добавим и в сетку, и отдельно? по скринам: в первом материал для печати как бы отдельно, но во втором тоже есть. Сделаем универсально */

        .extra-row {
            background: #f9fbfe;
            border-radius: 22px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #e2e9f2;
        }

        .extra-icon {
            font-size: 30px;
            min-width: 48px;
            text-align: center;
        }

        .extra-content h4 {
            font-size: 18px;
            font-weight: 670;
            color: #0f253c;
        }

        .extra-content p {
            font-size: 14px;
            color: #62748c;
        }

        .extra-content .highlight {
            font-weight: 600;
            color: #2d6e2d;
        }

        .promo-block {
            background: #eef3f9;
            border-radius: 22px;
            padding: 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed #8da6c0;
            margin: 8px 0;
        }

        .promo-text {
            font-weight: 650;
            font-size: 18px;
            color: #163458;
        }

        .promo-btn {
            background: white;
            border-radius: 30px;
            padding: 8px 20px;
            font-weight: 500;
            color: #1f3a5f;
            border: 1px solid #b7cbdf;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 15px;
            color: #6a7f9b;
            text-align: center;
            border-top: 1px solid #e1e8f2;
            padding-top: 20px;
        }

        .footer-note a {
            color: #2b4d77;
            text-decoration: none;
            font-weight: 500;
        }

        .small-note {
            display: flex;
            justify-content: flex-end;
            margin-top: 16px;
            font-size: 13px;
            color: #8a9bb0;
        }

        /* адаптация */
        @media (max-width: 380px) {
            .feature-card h3 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-bar">
            <div class="signal-icons">
            </div>
        </div>

        <!-- Статистика: 02 дня без пропуска -->
        <div class="stats-block">
            <span class="stats-number">02</span>
            <span class="stats-label">Дня без пропуска</span>
        </div>

        <!-- Сетка: Теория / Практика / Тест / Материалы для печати (с первого скрина, но "Материалы для печати" лучше поставить в сетку, т.к. и на первом и втором есть) -->
        <div class="feature-grid">
            <!-- Теория -->
            <a href="theory.html">
            <div class="feature-card">
                <h3>📘 Теория</h3>
                <p>Учебник, поиск таблиц, теорем и формул</p>
            </div>
            </a>
            <!-- Практика -->
            <a href="practice.html">
            <div class="feature-card">
                <h3>✏️ Практика</h3>
                <p>Тренировки и отработка ошибок</p>
            </div>
            </a>
            <!-- Тест -->
            <div class="feature-card">
                <h3>📋 Тест</h3>
                <p>Сгенерировать пробник ЕГЭ</p>
            </div>
            <!-- Материалы для печати -->
            <a href="material.html">
            <div class="feature-card">
                <h3>🖨️ Материалы для печати</h3>
                <p>Преподавателям для уроков, ученикам для подготовки</p>
            </div>
            </a>
        </div>

            <!-- Другие предметы ЕГЭ -->
            <div class="extra-row">
                <span class="extra-icon">📚</span>
                <div class="extra-content">
                    <h4>Другие предметы ЕГЭ</h4>
                </div>
            </div>
        </div>

    </div>

    <!-- Комментарий: объединены данные с двух скриншотов. Присутствуют все пункты: ачивки, премиум-баннер, статистика, теория, практика, тест, материалы для печати, гудзики, +20%, другие предметы, промокод и футер с логотипом. -->
</body>
</html>
