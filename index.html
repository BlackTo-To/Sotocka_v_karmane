<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Соточка в кармане</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #7c8cd1 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 30px;
            position: relative;
        }


        /* Основной контент */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px 20px;
        }

        .status-icons {
            display: flex;
            gap: 8px;
        }

        .status-icons span {
            width: 18px;
            height: 18px;
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
        }

        /* Карточки (как в предыдущем дизайне) */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            animation: fadeIn 0.5s ease forwards;
        }
        .card h2 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .card p {
            font-size: 20px;
            color: #2d3748;
            line-height: 1.6;
            font-weight: 400;
        }

        .card1 {
            padding: 20px;
            border-radius: 20px;
            background: #f3f3f3 url('your-image.png') no-repeat right center;
            background-size: contain;
        }

        /* Название */
        .title {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 70px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
        }

        .title {
            font-size: 30px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 30px;
        }

        .title.bottom{
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }
         /* Разделители */
       .divider {
           margin: 30px 0;
           border: 0;
           height: 1px;
           background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .back-button {
                top: 20px;
                left: 20px;
                padding: 10px 20px;
                font-size: 14px;
            }

            .container {
                padding: 50px 10px 10px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card-large {
                grid-column: span 1;
            }

            .goodies-block {
                flex-direction: column;
                text-align: center;
            }

            .referral-card {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .back-button span:last-child {
                display: none;
            }
            
            .back-button {
                padding: 12px;
                border-radius: 50%;
            }
            
            .back-arrow {
                margin: 0;
            }
        }

        /* Анимации */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card, .premium-banner, .stats-container, .goodies-block, .referral-card, .other-subjects, .promo-block {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="time-status">
        <div class="status-icons">
        </div>
    </div>

        <!-- Название -->
        <div class="card1">
            <div class="title">
            <p>Соточка в кармане:</p>  
             <div class="bottom">ЕГЭ математика</div>
            </div>

            <img src="sotochka.jpg" alt="img" class="card-image">
        </div>
        <hr class="divider">

        <!-- Сетка карточек -->
        <a href="theory.html">
        <div class="cards-grid">
            <div class="card">
                <!--Теория-->
                <h3>📘 Теория</h3>
                <p>Учебник, поиск таблиц, теорем и формул</p>
            </div>
        </a>

        <hr class="divider">

            <!--Практика-->
            <a href="practice.html">
            <div class="card">
                <h3>⚡ Практика</h3>
                <p>Тренировки и отработка ошибок</p>
            </div>
            </a>

            <hr class="divider">
            
            <!--Мате-->
            <a href="material.html">
            <div class="card">
                <h3>🖨️ Материалы для печати</h3>
                <p>Преподавателям для уроков, ученикам для подготовки</p>
            </div>
            </a>
</div>
    <script>

        // Интерактивность для карточек
        document.querySelectorAll('.card, .goodies-block, .referral-card, .other-subjects, .promo-block, .premium-banner, .stats-container').forEach(el => {
            el.addEventListener('click', function() {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 100);
                console.log('Clicked:', this.innerText.slice(0, 30));
            });
        });

        // Поддержка клавиши ESC для возврата
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                goBack();
            }
        });
    </script>
</body>
</html>
